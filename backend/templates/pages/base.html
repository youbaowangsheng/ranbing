<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{% block title %}燃冰{% endblock %}</title>
  {% block og_meta %}
  <meta property="og:title" content="燃冰 — AI驱动的商务社交平台">
  <meta property="og:description" content="连接高质量人脉，发现商业机会。">
  <meta property="og:image" content="https://asiamlhk.com/static/img/og-cover.png">
  <meta property="og:url" content="https://asiamlhk.com">
  <meta property="og:type" content="website">
  {% endblock %}
  <style>
    /* ─── Reset & Base ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a1a;
      min-height: 100vh;
      padding-bottom: 70px;
    }
    a { text-decoration: none; color: inherit; }

    /* ─── Top Header ─── */
    .top-header {
      background: linear-gradient(135deg, #1a3a5c, #2d5a8a);
      color: #fff;
      padding: 12px 16px 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .header-logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .header-btn { color: rgba(255,255,255,0.85); font-size: 22px; cursor: pointer; background: none; border: none; }

    /* ─── Bottom Nav ─── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      padding: 6px 0;
      z-index: 100;
      height: 60px;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; cursor: pointer; padding: 4px 8px;
      color: #999; font-size: 10px;
    }
    .nav-item.active { color: #e86a3a; }
    .nav-item .nav-icon { font-size: 20px; }

    /* ─── Cards ─── */
    .card {
      background: #fff; border-radius: 12px; padding: 14px;
      margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card:active { background: #fafafa; }

    /* ─── Section Header ─── */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .section-title { font-size: 15px; font-weight: 600; }
    .section-more { font-size: 12px; color: #888; }

    /* ─── Tags ─── */
    .tag {
      display: inline-block; font-size: 11px; padding: 2px 8px;
      border-radius: 8px; margin: 2px;
    }
    .tag-blue { background: #e8f0fe; color: #1a3a5c; }
    .tag-orange { background: #fff3e8; color: #e86a3a; }
    .tag-green { background: #e8fdf5; color: #059669; }
    .tag-purple { background: #f3e8ff; color: #7c3aed; }
    .tag-gray { background: #f0f0f0; color: #666; }

    /* ─── Avatar ─── */
    .avatar-circle {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .avatar-lg { width: 56px; height: 56px; font-size: 20px; }

    /* ─── Scroll Horizontal ─── */
    .scroll-x { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .scroll-x::-webkit-scrollbar { display: none; }

    /* ─── Page Content ─── */
    .page-content { padding: 0 16px; }

    /* ─── Badge ─── */
    .badge-gold { background: linear-gradient(135deg,#f0a06a,#e86a3a); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge { background: #e8f0fe; color: #1a3a5c; font-size: 11px; padding: 2px 8px; border-radius: 10px; }

    /* ─── AI Bar ─── */
    .ai-bar {
      background: linear-gradient(135deg,#1a3a5c,#2d5a8a);
      border-radius: 12px; padding: 10px 14px; color: #fff;
      display: flex; align-items: center; gap: 10px;
      margin: 8px 0 12px;
      cursor: pointer;
    }
    .ai-bar-icon { font-size: 18px; }
    .ai-bar-text { flex: 1; font-size: 13px; opacity: 0.9; }
    .ai-bar-arrow { font-size: 14px; opacity: 0.6; }

    /* ─── Utility ─── */
    .text-orange { color: #e86a3a; }
    .text-gray { color: #888; }
    .text-sm { font-size: 12px; }
    .mt8 { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mb10 { margin-bottom: 10px; }
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; }
    .gap8 { gap: 8px; }
    .flex-1 { flex: 1; }
    .hidden { display: none; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Top Header -->
  <div class="top-header">
    <div class="header-row">
      <div class="header-logo">❄️ 燃冰</div>
      <div class="header-actions">
        {% if user.is_authenticated %}
          <a href="/pages/search/?q=" title="搜索">
            <button class="header-btn">🔍</button>
          </a>
          <a href="{% url 'my_profile' %}">
            <button class="header-btn">👤</button>
          </a>
          <a href="{% url 'logout' %}">
            <button class="header-btn" title="退出">🚪</button>
          </a>
        {% else %}
          <a href="{% url 'login' %}"><button class="header-btn">🔑</button></a>
        {% endif %}
      </div>
    </div>
    {% block header_content %}{% endblock %}
  </div>

  <!-- Page Content -->
  <div class="page-content" style="margin-top: 64px;">
    {% block content %}{% endblock %}
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="{% url 'home' %}" class="nav-item {% if page == 'home' %}active{% endif %}">
      <span class="nav-icon">🏠</span><span>首页</span>
    </a>
    <a href="{% url 'activity_list' %}" class="nav-item {% if page == 'activity' %}active{% endif %}">
      <span class="nav-icon">📅</span><span>活动</span>
    </a>
    <a href="{% url 'supply_demand' %}" class="nav-item {% if page == 'supply' %}active{% endif %}">
      <span class="nav-icon">💼</span><span>供需</span>
    </a>
    <a href="{% url 'community' %}" class="nav-item {% if page == 'community' %}active{% endif %}">
      <span class="nav-icon">💬</span><span>社群</span>
    </a>
    <a href="{% url 'my_profile' %}" class="nav-item {% if page == 'profile' %}active{% endif %}">
      <span class="nav-icon">👤</span><span>我的</span>
    </a>
  </div>

  {% block extra_js %}{% endblock %}
</body>
</html>
